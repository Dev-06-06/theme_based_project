<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SignSpeak — Transcript</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #0d0d0d; --muted: #888;
      --surface: #f7f5f0; --card: #ffffff; --border: rgba(0,0,0,0.08);
      --pop: #e8ff47; --pop2: #47d9ff;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--surface); color: var(--ink); min-height: 100vh;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image:
        radial-gradient(ellipse 60% 50% at 50% 0%, rgba(232,255,71,0.14) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 50% 100%, rgba(71,217,255,0.12) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }
    .page {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      min-height: 100vh; padding: 40px 20px 60px;
    }
    header {
      width: 100%; max-width: 900px;
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 80px; animation: fadeDown 0.5s ease both;
    }
    .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; letter-spacing: -0.5px; }
    .logo span { background: var(--ink); color: var(--pop); padding: 2px 8px; border-radius: 6px; margin-left: 4px; }

    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 28px; padding: 48px 40px; width: 100%; max-width: 540px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.07); animation: fadeUp 0.6s 0.1s ease both;
    }
    .icon-wrap {
      width: 56px; height: 56px; border-radius: 16px;
      background: var(--pop2); display: flex; align-items: center;
      justify-content: center; margin-bottom: 24px;
    }
    .icon-wrap svg { width: 24px; height: 24px; }

    .section-label {
      font-size: 12px; font-weight: 500; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
    }
    h1 {
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 28px; letter-spacing: -0.8px; margin-bottom: 28px;
    }

    .transcript-box {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 16px; padding: 24px;
      font-size: 20px; font-weight: 400; line-height: 1.5;
      color: var(--ink); min-height: 80px; margin-bottom: 12px;
      word-break: break-word;
    }
    .transcript-box.empty { color: var(--muted); font-style: italic; font-size: 16px; }

    .meta {
      font-size: 12px; color: var(--muted); margin-bottom: 32px;
      display: flex; align-items: center; gap: 6px;
    }
    .meta-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--muted); }

    .proceed-btn {
      width: 100%; padding: 16px; background: var(--ink); color: #fff;
      border: none; border-radius: 14px; font-family: 'DM Sans', sans-serif;
      font-size: 16px; font-weight: 500; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: all 0.2s; text-decoration: none;
    }
    .proceed-btn:hover { background: #222; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
    .proceed-btn svg { width: 18px; height: 18px; }

    @keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeUp   { from { opacity:0; transform:translateY(20px);  } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>
<div class="page">
  <header>
    <div class="logo">Sign<span>Speak</span></div>
  </header>

  <div class="card">
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0d0d0d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
    </div>

    <div class="section-label">Speech Captured</div>
    <h1>Your transcript</h1>

    {% if ans %}
    <div class="transcript-box">{{ ans }}</div>
    <div class="meta">
      <span class="meta-dot"></span>
      Recognized via Web Speech API
    </div>
    {% else %}
    <div class="transcript-box empty">Nothing captured yet. Go back and try speaking.</div>
    <div class="meta" style="margin-bottom:32px"></div>
    {% endif %}

    <a href="vids" class="proceed-btn">
      Convert to Signs
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="13 17 18 12 13 7"/><polyline points="6 17 11 12 6 7"/>
      </svg>
    </a>
  </div>
</div>
</body>
</html>
